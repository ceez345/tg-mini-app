<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- PyScript (Python в браузере) -->
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
        }
        h2 { margin-top: 10px; }
        input, button {
            width: 100%; padding: 14px; margin: 8px 0;
            border: 1px solid var(--tg-theme-hint-color, #cccccc);
            border-radius: 12px; box-sizing: border-box; font-size: 16px;
        }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            font-weight: 500; cursor: pointer; border: none;
        }
        button:active { opacity: 0.8; }
        #status { margin-top: 12px; font-size: 0.9em; min-height: 1.2em; }
        .loader { color: var(--tg-theme-hint-color, #888); font-style: italic; }
    </style>
</head>
<body>
    <h2>📱 Telegram Mini App</h2>
    <p id="loading" class="loader">⏳ Загрузка Python...</p>
    
    <input type="text" id="data-input" placeholder="Введите данные..." disabled>
    <button id="btn-save" disabled>💾 Сохранить</button>
    <button id="btn-load" disabled>📥 Загрузить</button>
    <p id="status"></p>

    <script type="py">
        from pyscript import document, window
        import json

        # Ждём готовности Telegram WebApp
        tg = window.Telegram.WebApp
        tg.ready()
        tg.expand()

        # Простая "БД" на основе localStorage браузера
        DB_KEY = "tg_miniapp_data"

        def get_db():
            raw = window.localStorage.getItem(DB_KEY)
            return json.loads(raw) if raw else {}

        def save_db(db):
            window.localStorage.setItem(DB_KEY, json.dumps(db))

        def get_user_id():
            user = tg.initDataUnsafe.user
            return str(user.id) if user else "guest"

        def save_handler(event):
            uid = get_user_id()
            value = document.querySelector("#data-input").value.strip()
            if not value:
                show_status("⚠️ Введите данные", "orange")
                return
            db = get_db()
            db[uid] = value
            save_db(db)
            show_status("✅ Сохранено в локальную БД", "green")

        def load_handler(event):
            uid = get_user_id()
            db = get_db()
            value = db.get(uid, "")
            document.querySelector("#data-input").value = value
            show_status("📥 Данные загружены" if value else "⚠️ Нет сохранённых данных", 
                       "green" if value else "orange")

        def show_status(text, color="black"):
            el = document.querySelector("#status")
            el.textContent = text
            el.style.color = color

        # Активируем интерфейс после загрузки Python
        document.querySelector("#loading").style.display = "none"
        document.querySelector("#data-input").disabled = False
        document.querySelector("#btn-save").disabled = False
        document.querySelector("#btn-load").disabled = False

        document.querySelector("#btn-save").addEventListener("click", save_handler)
        document.querySelector("#btn-load").addEventListener("click", load_handler)
    </script>
</body>
</html>
